name: Samed Panel APK Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Java 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Proje Yapisini Kur
        run: |
          # 1. Gerekli Android klasör mimarisini oluştur
          mkdir -p app/src/main/java/com/samed/panel
          mkdir -p app/src/main/res/layout
          
          # 2. Ana dizindeki kod ve tasarım dosyalarını doğru klasörlere taşı
          find . -maxdepth 1 -iname "mainactivity.java" -exec cp {} app/src/main/java/com/samed/panel/MainActivity.java \;
          find . -maxdepth 1 -iname "bootreceiver.java" -exec cp {} app/src/main/java/com/samed/panel/BootReceiver.java \;
          find . -maxdepth 1 -iname "androidmanifest.xml" -exec cp {} app/src/main/AndroidManifest.xml \;
          find . -maxdepth 1 -iname "activity_main.xml" -exec cp {} app/src/main/res/layout/activity_main.xml \;
          
          # 3. Gönderdiğiniz build.gradle dosyasını uygulama modülüne taşı
          if [ -f build.gradle ]; then
            cp build.gradle app/build.gradle
          fi

          # 4. İmza hatasını (Signing Error) aşmak için release moduna geçici debug imzası ekle
          sed -i '/release {/a \ \ \ \ \ \ \ \ \ \ \ \ signingConfig signingConfigs.debug' app/build.gradle
          
          # 5. Kök dizin için temiz Gradle ayarlarını oluştur
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
          echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }" >> settings.gradle
          echo "rootProject.name = 'SamedPanel'" >> settings.gradle
          echo "include ':app'" >> settings.gradle

          # 6. Kök dizine eklenti yöneticisini yaz
          echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle
          
          # 7. Jetpack ve AndroidX ayarlarını yapılandır
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 8. Gradle Wrapper'ı hazırla
          gradle wrapper --gradle-version 8.5

      - name: APK Derle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Samed-Panel-Release-APK
          path: app/build/outputs/apk/release/*.apk
